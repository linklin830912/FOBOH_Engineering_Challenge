services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0